<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edunova | Jameel Jamali</title>
    <meta
      name="description"
      content="Jameel Jamali is Edunova's AI tutor for accurate explanations, coding help, and exam prep."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Poppins:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #050816;
        --bg-2: #071024;
        --panel: rgba(12, 18, 38, 0.9);
        --panel-2: rgba(18, 27, 52, 0.92);
        --line: rgba(157, 179, 255, 0.15);
        --text: #f2f6ff;
        --muted: #9db0d2;
        --accent: #5a8cff;
        --accent-2: #33d48e;
        --accent-3: #8d6bff;
        --shadow: 0 28px 80px rgba(0, 0, 0, 0.48);
      }

      * {
        box-sizing: border-box;
      }

      html, body, #root {
        min-height: 100%;
        margin: 0;
      }

      body {
        font-family: Inter, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 10% 8%, rgba(90, 140, 255, 0.24), transparent 26%),
          radial-gradient(circle at 82% 18%, rgba(141, 107, 255, 0.18), transparent 24%),
          radial-gradient(circle at 50% 120%, rgba(51, 212, 142, 0.1), transparent 24%),
          linear-gradient(180deg, var(--bg), var(--bg-2));
        overflow-x: hidden;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button,
      textarea,
      input {
        font: inherit;
      }

      .chat-shell {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .chat-topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        backdrop-filter: blur(18px) saturate(1.15);
        background: rgba(5, 8, 22, 0.74);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      .topbar-inner {
        max-width: 1280px;
        width: min(1280px, 92vw);
        margin: 0 auto;
        min-height: 78px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 0.8rem;
        font-family: Poppins, sans-serif;
        font-weight: 800;
        letter-spacing: 0.02em;
      }

      .brand-mark {
        width: 42px;
        height: 42px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, var(--accent), var(--accent-3));
        box-shadow: 0 14px 28px rgba(90, 140, 255, 0.26);
      }

      .nav-links {
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem;
      }

      .nav-links a {
        padding: 0.62rem 0.95rem;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: #dce7ff;
        font-size: 0.92rem;
      }

      .nav-links a.is-active {
        background: rgba(90, 140, 255, 0.16);
        border-color: rgba(90, 140, 255, 0.34);
      }

      .page {
        max-width: 1280px;
        width: min(1280px, 92vw);
        margin: 0 auto;
        padding: 1.4rem 0 2rem;
        display: grid;
        grid-template-columns: 320px minmax(0, 1fr);
        gap: 1.25rem;
      }

      .panel,
      .chat-card,
      .section-card,
      .message-card {
        border: 1px solid var(--line);
        border-radius: 24px;
        background:
          linear-gradient(180deg, rgba(20, 29, 58, 0.96), rgba(9, 13, 28, 0.96)),
          radial-gradient(circle at top left, rgba(90, 140, 255, 0.14), transparent 34%);
        box-shadow: var(--shadow);
      }

      .panel {
        padding: 1.35rem;
        display: grid;
        gap: 1rem;
        align-content: start;
      }

      .eyebrow {
        margin: 0;
        text-transform: uppercase;
        letter-spacing: 0.09em;
        color: #9fc2ff;
        font-size: 0.75rem;
        font-weight: 800;
      }

      .panel h1,
      .chat-head h2 {
        margin: 0;
        font-family: Poppins, sans-serif;
      }

      .panel h1 {
        font-size: clamp(2rem, 4vw, 3.15rem);
        line-height: 1;
      }

      .panel p,
      .subtle,
      .chat-head p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.75rem;
      }

      .stat {
        padding: 0.9rem;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .stat strong {
        display: block;
        margin-bottom: 0.18rem;
        font-size: 0.98rem;
      }

      .stat span {
        color: var(--muted);
        font-size: 0.84rem;
      }

      .section-card {
        padding: 1rem 1.05rem;
      }

      .prompt-list {
        display: grid;
        gap: 0.55rem;
        margin-top: 0.8rem;
      }

      .prompt-pill {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        width: fit-content;
        padding: 0.5rem 0.75rem;
        border-radius: 999px;
        background: rgba(90, 140, 255, 0.14);
        border: 1px solid rgba(90, 140, 255, 0.18);
        color: #dce7ff;
        font-size: 0.87rem;
        cursor: pointer;
      }

      .chat-card {
        min-height: 78vh;
        display: grid;
        grid-template-rows: auto 1fr auto;
        overflow: hidden;
      }

      .chat-head {
        padding: 1.35rem 1.35rem 1rem;
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        background: linear-gradient(180deg, rgba(23, 33, 62, 0.94), rgba(11, 17, 35, 0.94));
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        color: #8ef0b4;
        font-size: 0.86rem;
        margin-top: 0.25rem;
      }

      .status::before {
        content: '';
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--accent-2);
        box-shadow: 0 0 16px rgba(51, 212, 142, 0.7);
      }

      .chat-body {
        padding: 1rem 1rem 0.8rem;
        overflow: auto;
        display: grid;
        gap: 0.75rem;
      }

      .message-row {
        display: flex;
      }

      .message-row.user {
        justify-content: flex-end;
      }

      .bubble {
        max-width: min(86%, 820px);
        border-radius: 20px;
        padding: 0.95rem 1rem;
        border: 1px solid transparent;
        white-space: pre-wrap;
        line-height: 1.55;
      }

      .bubble.user {
        background: rgba(90, 140, 255, 0.18);
        border-color: rgba(90, 140, 255, 0.32);
      }

      .bubble.assistant {
        background: rgba(255, 255, 255, 0.045);
        border-color: rgba(255, 255, 255, 0.08);
      }

      .bubble.thinking {
        color: #b8c7e8;
      }

      .thinking-dots {
        display: inline-flex;
        gap: 0.22rem;
        margin-left: 0.45rem;
        vertical-align: middle;
      }

      .thinking-dots span {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: #8ca7e8;
        animation: pulse 1s infinite ease-in-out;
      }

      .thinking-dots span:nth-child(2) {
        animation-delay: 0.16s;
      }

      .thinking-dots span:nth-child(3) {
        animation-delay: 0.32s;
      }

      @keyframes pulse {
        0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
        40% { transform: translateY(-3px); opacity: 1; }
      }

      .structured-answer {
        display: grid;
        gap: 0.8rem;
      }

      .answer-section {
        border-radius: 18px;
        padding: 0.9rem 0.95rem;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .answer-section h4 {
        margin: 0 0 0.45rem;
        font-size: 0.96rem;
        color: #dce7ff;
      }

      .answer-section p {
        margin: 0;
        color: #eaf1ff;
        white-space: pre-wrap;
      }

      .composer {
        padding: 1rem 1rem 1.1rem;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        background: linear-gradient(180deg, rgba(10, 15, 31, 0.76), rgba(7, 10, 20, 0.94));
      }

      .chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-bottom: 0.82rem;
      }

      .chip-row button {
        border: 1px solid rgba(134, 162, 255, 0.28);
        background: rgba(57, 98, 210, 0.14);
        color: #dfeaff;
        border-radius: 999px;
        padding: 0.48rem 0.8rem;
        cursor: pointer;
      }

      .composer-form {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 0.7rem;
      }

      .composer-form textarea {
        resize: none;
        min-height: 60px;
        max-height: 160px;
        border-radius: 18px;
        border: 1px solid rgba(131, 154, 219, 0.28);
        background: rgba(8, 14, 30, 0.96);
        color: var(--text);
        padding: 0.95rem 1rem;
        outline: none;
      }

      .composer-form textarea::placeholder {
        color: #7083a9;
      }

      .send-btn {
        border: 0;
        border-radius: 18px;
        padding: 0 1.05rem;
        min-width: 120px;
        color: #f4f8ff;
        font-weight: 800;
        background: linear-gradient(135deg, var(--accent), var(--accent-3));
        box-shadow: 0 16px 30px rgba(90, 140, 255, 0.28);
        cursor: pointer;
      }

      .error-banner {
        margin-top: 0.7rem;
        padding: 0.75rem 0.9rem;
        border-radius: 16px;
        border: 1px solid rgba(255, 107, 107, 0.28);
        background: rgba(255, 107, 107, 0.12);
        color: #ffd8d8;
        font-size: 0.9rem;
      }

      .empty-state {
        padding: 1rem;
        border-radius: 18px;
        border: 1px dashed rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.03);
        color: #9db0d2;
      }

      @media (max-width: 980px) {
        .page {
          grid-template-columns: 1fr;
        }

        .chat-card {
          min-height: 70vh;
        }
      }

      @media (max-width: 640px) {
        .topbar-inner,
        .page {
          width: min(1280px, 94vw);
        }

        .topbar-inner {
          flex-direction: column;
          align-items: flex-start;
          padding: 0.9rem 0;
        }

        .chat-head {
          flex-direction: column;
        }

        .composer-form {
          grid-template-columns: 1fr;
        }

        .send-btn {
          min-height: 48px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script src="api-client.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" data-presets="react" src="jameel-chatbot.jsx"></script>
  </body>
</html>
