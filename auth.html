<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduNova | Login & Signup</title>
    <meta
      name="description"
      content="EduNova premium login and signup experience with cinematic visuals and smooth interactions."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              edunova: {
                50: '#eef8ff',
                100: '#d8efff',
                200: '#afdfff',
                300: '#78c5ff',
                400: '#41aaff',
                500: '#0f8fff',
                600: '#006fd6',
                700: '#0457a4',
                800: '#0a3a68',
                900: '#071f37'
              }
            },
            boxShadow: {
              glow: '0 0 30px rgba(15, 143, 255, 0.4)',
              softglass: '0 20px 45px rgba(2, 8, 24, 0.5)'
            }
          }
        }
      };
    </script>
    <link rel="stylesheet" href="auth-react.css" />
  </head>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/framer-motion/dist/framer-motion.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="api-client.js"></script>
    <script type="text/babel" data-presets="react" src="auth-react.jsx"></script>
  </body>
</html>
